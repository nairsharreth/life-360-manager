<!DOCTYPE html>
<html>

<head>

<title>Activity Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#4c1d95);
color:white;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
font-size:48px;
text-align:center;
background:linear-gradient(90deg,#a78bfa,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:30px;
}

.card{
background:#1e1b4b;
padding:25px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
margin-bottom:10px;
font-size:15px;
}

button{
padding:12px;
border-radius:10px;
border:none;
background:linear-gradient(90deg,#a78bfa,#6366f1);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.reset{
background:linear-gradient(90deg,#ef4444,#f97316);
}

.progress{
height:14px;
background:#312e81;
border-radius:10px;
margin-top:10px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#a78bfa,#22d3ee);
border-radius:10px;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #4338ca;
}

.priority{
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

.high{background:#ef4444}
.medium{background:#facc15;color:black}
.low{background:#22c55e}

.delete{
background:#ef4444;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.stats{
display:flex;
justify-content:space-between;
font-size:20px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Daily Activity Tracker</h1>

<div class="card">

<input id="task" placeholder="Task name">

<select id="priority">

<option value="high">High Priority</option>
<option value="medium">Medium Priority</option>
<option value="low">Low Priority</option>

</select>

<button onclick="addTask()">Add Task</button>

</div>

<div class="card">

<div class="stats">

<div>Completed: <span id="done">0</span></div>
<div>Total: <span id="total">0</span></div>

</div>

<div class="progress">
<div class="fill" id="bar"></div>
</div>

</div>

<div class="card">

<h2>Task List</h2>

<table id="table"></table>

<button class="reset" onclick="resetTasks()">Reset Tasks</button>

</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

function addTask(){

let text = document.getElementById("task").value
let priority = document.getElementById("priority").value

if(!text) return

tasks.push({text:text,priority:priority,done:false})

localStorage.setItem("tasks",JSON.stringify(tasks))

document.getElementById("task").value=""

render()

}

function toggleTask(i){

tasks[i].done = !tasks[i].done

localStorage.setItem("tasks",JSON.stringify(tasks))

render()

}

function deleteTask(i){

tasks.splice(i,1)

localStorage.setItem("tasks",JSON.stringify(tasks))

render()

}

function resetTasks(){

tasks=[]

localStorage.setItem("tasks",JSON.stringify(tasks))

render()

}

function render(){

let table=document.getElementById("table")

table.innerHTML=""

tasks.forEach((t,i)=>{

table.innerHTML+=`

<tr>

<td>
<input type="checkbox" ${t.done?"checked":""} onclick="toggleTask(${i})">
</td>

<td>${t.text}</td>

<td><span class="priority ${t.priority}">${t.priority}</span></td>

<td><span class="delete" onclick="deleteTask(${i})">Delete</span></td>

</tr>

`

})

let completed = tasks.filter(t=>t.done).length

document.getElementById("done").innerText=completed
document.getElementById("total").innerText=tasks.length

let percent = (completed/(tasks.length||1))*100

document.getElementById("bar").style.width = percent + "%"

}

render()

</script>

</body>

</html>
