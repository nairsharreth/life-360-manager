<!DOCTYPE html>
<html>
<head>

<title>Finance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
font-size:48px;
text-align:center;
background:linear-gradient(90deg,#38bdf8,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:6px;
margin-bottom:10px;
font-size:15px;
}

button{
padding:12px;
border-radius:10px;
border:none;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#38bdf8,#6366f1);
color:white;
margin-top:10px;
}

.reset{
background:linear-gradient(90deg,#ef4444,#f97316);
}

.progress{
height:14px;
background:#334155;
border-radius:10px;
margin-top:10px;
}

.fill{
height:100%;
width:0%;
border-radius:10px;
background:linear-gradient(90deg,#22c55e,#38bdf8);
}

.stats{
display:flex;
justify-content:space-between;
font-size:22px;
margin-top:10px;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #334155;
}

.category{
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

.food{background:#22c55e}
.travel{background:#3b82f6}
.shop{background:#f59e0b}
.sub{background:#a855f7}

.delete{
background:#ef4444;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Finance Tracker</h1>

<div class="card">

<input id="amount" placeholder="Expense Amount">

<select id="category">
<option value="food">Food</option>
<option value="travel">Travel</option>
<option value="shop">Shopping</option>
<option value="sub">Subscription</option>
</select>

<input id="note" placeholder="Note">

<button onclick="addExpense()">Add Expense</button>

</div>

<div class="card">

<label>Monthly Budget</label>
<input id="budgetInput">

<button onclick="setBudget()">Update Budget</button>

<button class="reset" onclick="resetAll()">Reset All</button>

</div>

<div class="card">

<div class="stats">

<div>Total ₹<span id="total">0</span></div>
<div>Remaining ₹<span id="remaining">0</span></div>

</div>

<div class="progress">
<div class="fill" id="bar"></div>
</div>

</div>

<div class="card">

<h2>Expense History</h2>

<table id="table"></table>

</div>

</div>

<script>

let budget=localStorage.getItem("budget")||10000
let expenses=JSON.parse(localStorage.getItem("expenses"))||[]

document.getElementById("budgetInput").value=budget

function setBudget(){

budget=parseFloat(document.getElementById("budgetInput").value)

localStorage.setItem("budget",budget)

render()

}

function resetAll(){

budget=10000
expenses=[]

localStorage.setItem("budget",budget)
localStorage.setItem("expenses",JSON.stringify(expenses))

render()

}

function addExpense(){

let amt=parseFloat(document.getElementById("amount").value)
let category=document.getElementById("category").value
let note=document.getElementById("note").value

if(!amt)return

expenses.push({amount:amt,category:category,note:note})

localStorage.setItem("expenses",JSON.stringify(expenses))

document.getElementById("amount").value=""
document.getElementById("note").value=""

render()

}

function deleteExpense(i){

expenses.splice(i,1)

localStorage.setItem("expenses",JSON.stringify(expenses))

render()

}

function render(){

let totalSpent=expenses.reduce((sum,e)=>sum+e.amount,0)

document.getElementById("total").innerText=totalSpent
document.getElementById("remaining").innerText=budget-totalSpent

let percent=(totalSpent/budget)*100

document.getElementById("bar").style.width=percent+"%"

let table=document.getElementById("table")

table.innerHTML=""

expenses.forEach((e,i)=>{

table.innerHTML+=`
<tr>
<td>₹${e.amount}</td>
<td><span class="category ${e.category}">${e.category}</span></td>
<td>${e.note}</td>
<td><span class="delete" onclick="deleteExpense(${i})">Delete</span></td>
</tr>
`

})

}

render()

</script>

</body>
</html>
