<!DOCTYPE html>
<html>
<head>

<title>Energy Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins';
background:linear-gradient(135deg,#451a03,#b45309);
color:white;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
font-size:48px;
text-align:center;
background:linear-gradient(90deg,#facc15,#fb923c);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:30px;
}

.card{
background:#78350f;
padding:25px;
border-radius:16px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
}

button{
padding:12px;
border-radius:10px;
border:none;
background:linear-gradient(90deg,#fbbf24,#f97316);
color:white;
font-weight:bold;
margin-top:10px;
}

.stat{
font-size:24px;
margin-top:10px;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #f59e0b;
}

</style>
</head>

<body>

<div class="container">

<h1>Energy Usage Tracker</h1>

<div class="card">

<input id="unit" placeholder="Energy Used (kWh)">

<button onclick="addUsage()">Add Usage</button>

<button onclick="resetUsage()">Reset Data</button>

</div>

<div class="card">

<div class="stat">Total Usage: <span id="total"></span> kWh</div>
<div class="stat">Estimated Cost: ₹<span id="cost"></span></div>

</div>

<div class="card">

<h3>Usage History</h3>
<table id="table"></table>

</div>

</div>

<script>

let rate=8
let usage=JSON.parse(localStorage.getItem("energy"))||[]

function addUsage(){

let val=parseFloat(unit.value)
if(!val)return

usage.push(val)

localStorage.setItem("energy",JSON.stringify(usage))

render()

}

function resetUsage(){

usage=[]
localStorage.setItem("energy",JSON.stringify(usage))

render()

}

function render(){

let totalUsage=usage.reduce((a,b)=>a+b,0)

total.innerText=totalUsage
cost.innerText=(totalUsage*rate).toFixed(2)

table.innerHTML=""

usage.forEach(e=>{
table.innerHTML+=`<tr><td>${e} kWh</td></tr>`
})

}

render()

</script>

</body>
</html>
